*{margin:0;padding:0;box-sizing:border-box}
body{font:13px/1.5 Inter,-apple-system,sans-serif;background:var(--bg);color:var(--text)}

.c2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.pnl{background:var(--surface);border-radius:10px;padding:18px;border:1px solid var(--border)}
.pnl h3{font-size:13px;font-weight:700;margin-bottom:12px}
.wrp{position:relative;height:280px}
@media(max-width:860px){.row4{grid-template-columns:1fr 1fr}.c2{grid-template-columns:1fr}}
