<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Policy Tracker — UK &amp; Germany</title>
<style>
:root{--bg:#f0f2f5;--surface:#fff;--text:#0f172a;--muted:#64748b;--border:#e2e8f0;--uk:#2563eb;--de:#dc2626;--eu:#7c3aed;--intl:#059669;--warning:#d97706}
*{margin:0;padding:0;box-sizing:border-box}
body{font:13px/1.5 Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text)}
.app{max-width:1100px;margin:0 auto;padding:28px 24px 40px}
.topbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px;margin-bottom:20px}
.topbar h1{font-size:20px;font-weight:700}
.topbar .sub{font-size:12px;color:var(--muted)}
.filter-row{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.fbtn{padding:6px 14px;font-size:11px;font-weight:600;border:1px solid var(--border);border-radius:7px;background:var(--surface);cursor:pointer;color:var(--muted);transition:all .15s}
.fbtn:hover{border-color:#94a3b8}
.fbtn.on{color:#fff}
.fbtn.on.all{background:var(--text);border-color:var(--text)}
.fbtn.on.uk{background:var(--uk);border-color:var(--uk)}
.fbtn.on.de{background:var(--de);border-color:var(--de)}
.fbtn.on.eu{background:var(--eu);border-color:var(--eu)}
.fbtn.on.intl{background:var(--intl);border-color:var(--intl)}
.updated{font-size:11px;color:var(--muted);margin-left:auto}
.card{background:var(--surface);border-radius:10px;padding:20px;border:1px solid var(--border);margin-bottom:12px;transition:all .15s}
.card:hover{border-color:#94a3b8}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:8px}
.card-top h3{font-size:15px;font-weight:700;flex:1}
.badge{display:inline-block;padding:2px 7px;border-radius:8px;font-size:10px;font-weight:700;white-space:nowrap}
.badge.uk{background:#dbeafe;color:var(--uk)}.badge.de{background:#fce7f3;color:var(--de)}
.badge.eu{background:#ede9fe;color:var(--eu)}.badge.intl{background:#d1fae5;color:var(--intl)}
.badge.active{background:#d1fae5;color:#065f46}.badadge.new{background:#fef3c7;color:var(--warning)}
.badge.warn{background:#fef3c7;color:var(--warning)}
.meta{font-size:11px;color:var(--muted);margin-bottom:8px}
.summary{font-size:12px;line-height:1.65;margin-bottom:10px}
.impact{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0;padding:10px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.ib{font-size:11px}.ib .hl{font-weight:700;margin-bottom:2px}.ib .hl .dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:4px}
.ib .hl .dot.uk{background:var(--uk)}.ib .hl .dot.de{background:var(--de)}
.links{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.links a{font-size:11px;color:var(--uk);text-decoration:none;padding:3px 9px;border:1px solid var(--border);border-radius:5px;transition:all .12s}
.links a:hover{background:#eff6ff;border-color:var(--uk)}
@media(max-width:640px){.impact{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
<div class="topbar"><div><h1>Policy Compliance Tracker</h1><div class="sub">EU / UK / Germany automotive entry policy — active &amp; forward-looking</div></div></div>
<div class="filter-row">
<button class="fbtn on all" data-j="all">All</button>
<button class="fbtn" data-j="UK">UK</button>
<button class="fbtn" data-j="Germany">Germany</button>
<button class="fbtn" data-j="EU">EU</button>
<button class="fbtn" data-j="International">Intl</button>
<span class="updated" id="upd"></span>
</div>
<div id="content"></div>
</div>
<script>
var DATA=[],j="all";
async function I(){try{var r=await fetch("policy-data.json");var d=await r.json();DATA=d.topics;document.getElementById("upd").textContent="Updated: "+(d.updated||"--").slice(0,10)}catch(e){document.getElementById("content").innerHTML='<div style="text-align:center;padding:60px;color:#64748b">Unable to load policy data</div>';return}R()}
function R(){var f=j=="all"?DATA:DATA.filter(function(t){return t.jurisdiction.indexOf(j)>=0});var h="";f.forEach(function(t){var jc=t.jurisdiction.indexOf("UK")>=0?"uk":t.jurisdiction.indexOf("Germany")>=0?"de":t.jurisdiction.indexOf("EU")>=0?"eu":"intl";var sc=t.phase=="2026新升级"?"new":t.phase=="生效中"?"active":"warn";var lh=(t.links||[]).map(function(l){return'<a href="'+l.url+'" target="_blank">'+l.text+'</a>'}).join("");h+='<div class="card"><div class="card-top"><h3>'+t.title+'</h3><div style="display:flex;gap:4px;flex-shrink:0"><span class="badge '+jc+'">'+t.jurisdiction+'</span><span class="badge '+sc+'">'+(t.phase||t.status)+'</span></div></div><div class="meta">Since: '+(t.effective_date||"--")+' · Watch: '+(t.monitoring||"--")+'</div><div class="summary">'+t.summary+'</div><div class="impact"><div class="ib"><div class="hl"><span class="dot uk"></span>UK Impact</div>'+(t.impact_uk||"--")+'</div><div class="ib"><div class="hl"><span class="dot de"></span>DE Impact</div>'+(t.impact_de||"--")+'</div></div>'+(lh?'<div class="links">'+lh+'</div>':'')+'</div>'});document.getElementById("content").innerHTML=h}
document.querySelectorAll(".fbtn").forEach(function(b){b.onclick=function(){document.querySelectorAll(".fbtn").forEach(function(x){x.classList.remove("on","all","uk","de","eu","intl")});j=b.dataset.j;var c=j=="UK"?"uk":j=="Germany"?"de":j=="EU"?"eu":j=="International"?"intl":"all";b.classList.add("on",c);R()}});
I();
</script>
</body>
</html>
