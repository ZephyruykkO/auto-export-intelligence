<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Sales Dashboard — UK &amp; Germany</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#f0f2f5;--surface:#fff;--text:#0f172a;--muted:#64748b;--border:#e2e8f0;--uk:#2563eb;--de:#dc2626;--accent:#0ea5e9}
*{margin:0;padding:0;box-sizing:border-box}
body{font:13px/1.5 Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text)}
.app{max-width:1320px;margin:0 auto;padding:28px 24px 40px}
.topbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px;margin-bottom:26px}
.topbar h1{font-size:20px;font-weight:700;letter-spacing:-.02em}
.topbar .filters{display:flex;gap:8px}
.filter-btn{padding:7px 16px;font-size:12px;font-weight:600;border:1px solid var(--border);border-radius:7px;background:var(--surface);cursor:pointer;color:var(--muted);transition:all .15s}
.filter-btn:hover{border-color:#94a3b8;color:var(--text)}
.filter-btn.on{color:#fff;border-color:transparent}
.filter-btn.on.uk-bg{background:var(--uk)}.filter-btn.on.de-bg{background:var(--de)}.filter-btn.on.all-bg{background:var(--text)}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.kpi{background:var(--surface);border-radius:10px;padding:18px 20px;border:1px solid var(--border)}
.kpi .label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.kpi .value{font-size:26px;font-weight:700;letter-spacing:-.02em}
.kpi .sub{font-size:11px;color:var(--muted);margin-top:4px}
.kpi.uk .value{color:var(--uk)}.kpi.de .value{color:var(--de)}
.charts{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:24px}
.panel{background:var(--surface);border-radius:10px;padding:20px;border:1px solid var(--border)}
.panel .ptitle{font-size:13px;font-weight:700;margin-bottom:16px;color:var(--text)}
.panel .wrap{position:relative;height:340px}
.table-panel{background:var(--surface);border-radius:10px;border:1px solid var(--border);overflow:hidden}
.table-top{padding:14px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.table-top h3{font-size:13px;font-weight:700}
.table-top input{padding:6px 12px;border:1px solid var(--border);border-radius:6px;font-size:12px;width:200px;outline:none}
.table-top input:focus{border-color:#94a3b8}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{font-weight:600;color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.06em;background:#f8fafc;border-bottom:1px solid var(--border);padding:10px 16px;text-align:right;cursor:pointer}
th:first-child{text-align:left}
td{padding:9px 16px;text-align:right;border-bottom:1px solid #f1f5f9}
td:first-child{text-align:left;font-weight:600}
tr:hover td{background:#f8fafc}
.tag{padding:2px 7px;border-radius:8px;font-size:10px;font-weight:700}
.tag.uk{background:#dbeafe;color:var(--uk)}.tag.de{background:#fce7f3;color:var(--de)}
.footer{padding:18px;text-align:center;font-size:11px;color:var(--muted)}
@media(max-width:860px){.kpi-row{grid-template-columns:1fr 1fr}.charts{grid-template-columns:1fr}}
@media(max-width:520px){.kpi-row{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
<div class="topbar">
<div><h1>UK &amp; Germany Sales Dashboard</h1></div>
<div class="filters">
<button class="filter-btn on all-bg" data-year="all">All Years</button>
<button class="filter-btn" data-year="2025">2025</button>

<button class="filter-btn on all-bg" data-market="all">All Markets</button>
<button class="filter-btn" data-market="UK">UK</button>
<button class="filter-btn" data-market="Germany">DE</button>
</div>
</div>
<div class="kpi-row" id="kpi"></div>

</div>
<div class="table-panel">

</div>
<div class="footer">Data: SMMT (UK) / KBA (DE) · Updated 2026-06</div>
</div>

function rTable(ft){ft=ft||"";var d=F(),agg={};d.forEach(function(x){if(!agg[x.brand])agg[x.brand]={brand:x.brand,UK:0,Germany:0};agg[x.brand][x.market]+=x.registrations});var rows=Object.values(agg);if(ft)rows=rows.filter(function(r){return r.brand.toLowerCase().indexOf(ft.toLowerCase())>=0});rows.sort(function(a,b){return(b.UK+b.Germany)-(a.UK+a.Germany)});function f(n){return n>=1e6?(n/1e6).toFixed(2)+"M":(n/1e3).toFixed(0)+"K"}document.getElementById("thead").innerHTML='<tr><th>Brand</th><th>UK</th><th>Germany</th><th>Total</th></tr>';var h="";rows.forEach(function(r){h+='<tr><td>'+r.brand+'</td><td><span class="tag uk">'+f(r.UK)+'</span></td><td><span class="tag de">'+f(r.Germany)+'</span></td><td style="font-weight:600">'+f(r.UK+r.Germany)+'</td></tr>'});document.getElementById("tbody").innerHTML=h}
