<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auto Export Intelligence</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font:16px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f4f5f7;color:#1a1a2e;display:flex;align-items:center;justify-content:center;min-height:100vh}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:600px;width:100%;padding:20px}
.card{background:#fff;border-radius:10px;padding:28px 24px;text-align:center;border:1px solid #e5e7eb;cursor:pointer;transition:all .2s;text-decoration:none;color:inherit;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.08);border-color:#94a3b8}
.card h2{font-size:18px;margin-bottom:6px}
.card p{font-size:13px;color:#6b7280}
.card.sales{border-left:4px solid #2563eb}
.card.policy{border-left:4px solid #059669}
</style>
</head>
<body>
<div class="cards">
<a class="card sales" href="dashboard/index.html">
<h2>Sales Dashboard</h2>
<p>UK &amp; Germany brand sales 2025–2026</p>
</a>
<a class="card policy" href="dashboard/policy.html">
<h2>Policy Tracker</h2>
<p>EU / UK / DE automotive policy compliance</p>
</a>
</div>
</body>
</html>
