<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Auto Export Intelligence</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font:15px/1.5 Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:linear-gradient(135deg,#f0f2f5 0%,#e8ecf1 100%);color:#0f172a;display:flex;align-items:center;justify-content:center;min-height:100vh}
.panel{text-align:center;max-width:560px;padding:40px}
.panel h1{font-size:28px;font-weight:800;letter-spacing:-.03em;margin-bottom:6px}
.panel .sub{font-size:14px;color:#64748b;margin-bottom:32px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.card{background:#fff;border-radius:12px;padding:28px 20px;text-align:center;border:1px solid #e2e8f0;cursor:pointer;transition:all .2s;text-decoration:none;color:inherit;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.06);border-color:#94a3b8}
.card .icon{font-size:28px;margin-bottom:10px}
.card h2{font-size:16px;font-weight:700;margin-bottom:4px}
.card p{font-size:12px;color:#64748b}
.card.sales{border-left:4px solid #2563eb}
.card.policy{border-left:4px solid #059669}
.foot{font-size:11px;color:#94a3b8;margin-top:32px}
@media(max-width:480px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="panel">
<h1>Auto Export Intelligence</h1>
<div class="sub">UK &amp; Germany · Market Entry Dashboard</div>
<div class="grid">
<a class="card sales" href="dashboard/index.html">
<div class="icon">📊</div>
<h2>Sales Dashboard</h2>
<p>30 brands · UK &amp; DE monthly sales · 2025–2026</p>
</a>
<a class="card policy" href="dashboard/policy.html">
<div class="icon">⚖️</div>
<h2>Policy Tracker</h2>
<p>13 active policies · tariff · ZEV · homologation</p>
</a>
</div>
<div class="foot">Data: SMMT / KBA / EUR-Lex / GOV.UK / UNECE · Auto-updated weekly</div>
</div>
</body>
</html>
