<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Auto Export Intelligence</title>
<style>
:root{--bg:#0b1120;--surface:#111827;--text:#f1f5f9;--muted:#94a3b8;--border:#1e293b;--accent:#3b82f6;--accent2:#10b981;--accent3:#8b5cf6;--accent4:#f59e0b}
*{margin:0;padding:0;box-sizing:border-box}
body{font:14px/1.5 Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh;display:flex;flex-direction:column}
.top{background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;gap:6px;flex-shrink:0}
.top .logo{font-size:15px;font-weight:800;letter-spacing:-.02em;color:#fff;margin-right:24px;white-space:nowrap}
.top .logo span{color:var(--accent)}
.tab{padding:7px 18px;font-size:12px;font-weight:600;border-radius:7px;cursor:pointer;border:none;background:transparent;color:var(--muted);transition:all .15s;white-space:nowrap}
.tab:hover{background:rgba(255,255,255,.06);color:#e2e8f0}
.tab.on{background:var(--accent);color:#fff}
.top .right{margin-left:auto;display:flex;gap:8px;align-items:center}
.top .link{font-size:11px;color:var(--muted);text-decoration:none;padding:5px 10px;border-radius:6px;transition:all .15s}
.top .link:hover{color:#e2e8f0;background:rgba(255,255,255,.04)}
#frame{flex:1;border:none;width:100%;background:var(--bg)}
.loading{display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted);font-size:13px}
</style>
</head>
<body>
<div class="top">
<div class="logo">Auto<span>Export</span> Intelligence</div>
<button class="tab on" data-src="dashboard/index.html">Sales</button>
<button class="tab" data-src="dashboard/analytics.html">Analytics</button>
<button class="tab" data-src="dashboard/policy.html">Policy</button>
<a class="link" href="https://github.com/ZephyruykkO/auto-export-intelligence" target="_blank">GitHub</a>
</div>
<iframe id="frame" src="dashboard/index.html"></iframe>
<script>
document.querySelectorAll('.tab').forEach(function(b){
b.onclick=function(){
document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on')});
b.classList.add('on');
document.getElementById('frame').src=b.dataset.src;
}
});
</script>
</body>
</html>
